{% extends 'employees/base.html' %}

{% block title %}Apply for Leave{% endblock %}
{% block page_title %}Leave Application{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <form method="POST">
        {% csrf_token %}
        <div style="display: flex; flex-direction: column; gap: 1.25rem;">
            {% for field in form %}
            <div class="form-group">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <div style="color: var(--danger); font-size: 0.75rem;">{{ field.errors }}</div>
                {% endif %}
            </div>
            {% endfor %}
            <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1rem;">
                <a href="{% url 'dashboard' %}" class="btn btn-outline">Cancel</a>
                <button type="submit" class="btn btn-primary">Submit Application</button>
            </div>
        </div>
    </form>
</div>

<style>
    .form-group label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; }
    .form-group input, .form-group select, .form-group textarea {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #e2e8f0;
        border-radius: 0.5rem;
        font-family: inherit;
    }
</style>
{% endblock %}
