{% extends 'employees/base.html' %}

{% block title %}Assign Task{% endblock %}
{% block page_title %}Assign New Task{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--text-main);">{{ field.label }}</label>
            {{ field.errors }}
            <div style="width: 100%;">
                {{ field }}
            </div>
        </div>
        {% endfor %}
        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="submit" class="btn btn-primary" style="flex: 1; justify-content: center;">Assign Task</button>
            <a href="{% url 'manager_dashboard' %}" class="btn btn-outline" style="flex: 1; justify-content: center;">Cancel</a>
        </div>
    </form>
</div>

<style>
    input, select, textarea {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #e2e8f0;
        border-radius: 0.375rem;
        font-family: inherit;
        font-size: 0.875rem;
    }
</style>
{% endblock %}
